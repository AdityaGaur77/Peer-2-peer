<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/relay.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Relay — free, live peer-to-peer tutoring in Python and AI. Taught by students, for students. No fees, ever. You pay it forward by teaching the next person."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Relay — free peer tutoring in Python & AI" />
    <meta
      property="og:description"
      content="Free live tutoring by students, for students. The only fee: pass it on."
    />
    <meta name="theme-color" content="#f1f4f9" />
    <title>Relay — free peer tutoring in Python & AI</title>
    <script>
      // set the theme before first paint — no flash
      (function () {
        try {
          var t = localStorage.getItem('relay.theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
